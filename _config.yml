title: WA4OSH
email: kr@wa4osh.com
description: >-
  Konrad Roeder (WA4OSH) — Extra class amateur radio operator, systems and RF
  engineer, ARES/EMCOMM volunteer. Writing about HAM radio projects, AI-assisted
  systems engineering, and the GoBox build. Co-author of the McGraw-Hill Wi-Fi
  Handbook. Upcoming book: AI Partnership Handbook.
baseurl: ""
url: "https://WA4OSH.com"
twitter_username: wa4osh
github_username: wa4osh

# Build settings
theme: minima
plugins:
  - jekyll-feed

# Exclude private and working files from public build
exclude:
  - _telos/
  - Gemfile
  - Gemfile.lock
  - README.md
  - .vscode/

# Collections for future expansion
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# Category pages (manual for Minima)
header_pages:
  - about.markdown
  - categories.markdown
